name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > app/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x app/gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p app/gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o app/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          cd app
          ./gradlew assembleDebug --no-daemon --warning-mode=all
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          JAVA_HOME: ${{ runner.os == 'macOS' && '/opt/homebrew/opt/openjdk@17' || '/usr/lib/jvm/temurin-17-jdk' }}

      - name: Build Release APK
        run: |
          cd app
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: List output files
        run: |
          echo "=== Debug APK ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK found"
          echo ""
          echo "=== Release APK ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK found"

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: downloads

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: downloads

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: downloads/*.apk
          body: |
            ## 🎮 DeckFlow Engine APK
            
            Download the APK and install on your Android device.
            
            ### Files
            - `app-debug.apk` - Debug build for testing
            - `app-release.apk` - Release build for production
            
            ### Version
            ${{ github.ref_name }}
            
            Built with GitHub Actions 🚀
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
