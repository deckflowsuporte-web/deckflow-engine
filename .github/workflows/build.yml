name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > app/local.properties
    
    - name: Create Gradle files
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false" > app/gradle.properties
        echo "android.useAndroidX=true" >> app/gradle.properties
        echo "rootProject.name = 'DeckFlow'" > app/settings.gradle
    
    - name: Build APK
      working-directory: app
      run: |
        export JAVA_HOME=$(/usr/libexec/java_home)
        which gradle || brew install gradle
        gradle -v
        gradle assembleDebug 2>&1
    
    - name: Check outputs
      run: |
        find app/build -type f -name "*.apk" -exec ls -lh {} \;
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: deckflow-apk
        path: app/build/outputs/apk/debug/*.apk
