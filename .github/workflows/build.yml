name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/nicowillis/android-sdk:2024.1
    steps:
    - uses: actions/checkout@v4
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > app/local.properties
    
    - name: Create gradle.properties
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m" > app/gradle.properties
        echo "android.useAndroidX=true" >> app/gradle.properties
    
    - name: Setup Gradle
      run: |
        export ANDROID_HOME=/opt/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        echo "rootProject.name = 'DeckFlow'" > app/settings.gradle
        gradle wrapper --gradle-version 8.2 2>&1
    
    - name: Build APK
      working-directory: app
      env:
        ANDROID_HOME: /opt/android-sdk
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        ./gradlew assembleDebug --no-daemon 2>&1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deckflow-apk
        path: app/build/outputs/apk/debug/*.apk
