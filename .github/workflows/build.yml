name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > app/local.properties
    
    - name: Create Gradle files
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false" > app/gradle.properties
        echo "android.useAndroidX=true" >> app/gradle.properties
        echo "rootProject.name = 'DeckFlow'" > app/settings.gradle
    
    - name: Install Gradle
      run: |
        export JAVA_HOME=$(/usr/libexec/java_home)
        brew install gradle@8.5
        /opt/homebrew/opt/gradle@8.5/bin/gradle -v
    
    - name: Generate wrapper
      working-directory: app
      run: |
        export JAVA_HOME=$(/usr/libexec/java_home)
        /opt/homebrew/opt/gradle@8.5/bin/gradle wrapper --gradle-version 8.5
        ./gradlew -v
    
    - name: Build APK
      working-directory: app
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.java-path }}
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      run: |
        export JAVA_HOME=$(/usr/libexec/java_home)
        ./gradlew assembleDebug --stacktrace 2>&1
    
    - name: Check outputs
      run: |
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No output dir"
        find app/build -name "*.apk" 2>/dev/null
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deckflow-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
