name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > app/local.properties
    
    - name: Create Gradle files
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m" > app/gradle.properties
        echo "android.useAndroidX=true" >> app/gradle.properties
        echo "rootProject.name = 'DeckFlow'" > app/settings.gradle
    
    - name: Setup Gradle wrapper
      working-directory: app
      run: |
        mkdir -p gradle/wrapper
        curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        printf '#!/bin/sh\ndir=$(dirname "$0")\nexec java -jar "$dir/gradle/wrapper/gradle-wrapper.jar" "$@"' > gradlew
        chmod +x gradlew
    
    - name: Build APK
      working-directory: app
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx2048m" >> ~/.gradle/gradle.properties
        pwd
        ls -la
        ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -200
    
    - name: Check outputs
      run: |
        find app/build -type f -name "*.apk" 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No output dir"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: deckflow-apk
        path: app/build/outputs/apk/debug/*.apk
