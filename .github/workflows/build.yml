name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > app/local.properties
    
    - name: Create gradle.properties
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m" > app/gradle.properties
        echo "android.useAndroidX=true" >> app/gradle.properties
    
    - name: Create gradle wrapper
      working-directory: app
      run: |
        touch settings.gradle
        gradle wrapper --gradle-version 8.2 2>&1 || echo "Wrapper may exist"
    
    - name: Build APK
      working-directory: app
      run: ./gradlew assembleDebug --no-daemon 2>&1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deckflow-apk
        path: app/build/outputs/apk/debug/*.apk
